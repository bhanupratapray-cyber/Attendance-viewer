<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Portal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; max-width: 700px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; }
        h1, h2 { color: #2c3e50; margin-bottom: 20px; }
        
        .role-btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #3498db; background: white; color: #3498db; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .role-btn:hover { background: #3498db; color: white; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s;}
        .submit-btn:hover { background: #27ae60; }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        .back-btn { background: none; border: none; color: #7f8c8d; cursor: pointer; margin-bottom: 15px; font-size: 0.9rem; text-decoration: underline; text-align: left; display: block;}

        /* Student Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .percentage-card { grid-column: span 2; background: #3498db; color: white; border: none; }
        
        /* Teacher Date Boxes (Bird's Eye View) */
        .date-box { cursor: pointer; transition: 0.2s; border-left: 5px solid #3498db; padding: 15px; }
        .date-box:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-color: #2ecc71; }
        .date-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.85rem; }
        
        /* Lists & Tables */
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; text-align: left;}
        .status-present { color: #27ae60; font-weight: bold; }
        .status-absent { color: #e74c3c; font-weight: bold; }
        .status-leave { color: #f39c12; font-weight: bold; } 
        
        /* Teacher Tabs */
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; border-radius: 6px; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { background: #3498db; color: white; }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .report-table th { background-color: #f4f7f6; color: #2c3e50; }
        .report-table td:nth-child(1), .report-table td:nth-child(2) { text-align: left; }
        
        .report-table tr { page-break-inside: avoid; }

        .filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .filter-row input { margin: 0; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="role-screen">
            <h1>Welcome</h1>
            <p style="color: #7f8c8d; margin-bottom: 30px;">Select your portal.</p>
            <button class="role-btn" onclick="showScreen('student-login')">👨‍🎓 I am a Student</button>
            <button class="role-btn" onclick="showScreen('teacher-login')">👨‍🏫 I am a Teacher</button>
        </div>

        <div id="student-login" class="hidden">
            <button class="back-btn" onclick="showScreen('role-screen')">← Back to Menu</button>
            <h2>Student Portal</h2>
            <input type="text" id="studentId" placeholder="Enter Enrollment Number" oninput="this.value = this.value.toUpperCase()">
            <button id="student-submit-btn" class="submit-btn" onclick="fetchAttendance('student')">View Report</button>
            <p id="student-loading-text" style="color: #3498db; font-weight: bold;" class="hidden">⏳ Fetching your records...</p>
        </div>

        <div id="teacher-login" class="hidden">
            <button class="back-btn" onclick="showScreen('role-screen')">← Back to Menu</button>
            <h2>Teacher Portal</h2>
            <input type="text" id="teacherId" placeholder="Enter Teacher ID">
            <input type="password" id="teacherPin" placeholder="Enter 4-Digit PIN">
            <button id="teacher-submit-btn" class="submit-btn" onclick="fetchAttendance('teacher')">View Dashboard</button>
            <p id="loading-text" style="color: #3498db; font-weight: bold;" class="hidden">⏳ Loading Database...</p>
        </div>

        <div id="student-dashboard" class="hidden">
            <button class="back-btn" onclick="resetPortal()">← Log Out</button>
            <h2 id="student-welcome" style="margin-top: 0;">Your Attendance</h2>
            
            <div class="stats-grid">
                <div class="stat-card percentage-card">
                    <h2 id="perc">0%</h2><p>Total Attendance</p>
                </div>
                <div class="stat-card">
                    <h2 id="pres">0</h2><p>Present</p>
                </div>
                <div class="stat-card">
                    <h2 id="abs">0</h2><p>Absent</p>
                </div>
            </div>

            <select id="monthFilter" onchange="applyStudentFilters()" style="margin-top: 20px;">
                <option value="all">All Months</option>
                <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                <option value="9">October</option><option value="10">November</option><option value="11">December</option>
            </select>

            <div style="margin-top: 20px; text-align: left;">
                <h3 style="color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px;">History</h3>
                <div id="student-log-list"></div>
            </div>
        </div>

        <div id="teacher-dashboard" class="hidden">
            <button class="back-btn" onclick="resetPortal()">← Log Out</button>
            <h2 id="teacher-welcome" style="margin-top: 0;">Teacher Dashboard</h2>
            
            <select id="teacherBatchSelect" onchange="handleBatchChange()"></select>

            <div class="tab-container" id="teacher-tabs" style="display: none;">
                <button class="tab-btn active" id="tab-daily" onclick="switchTeacherTab('daily')">📅 Daily Logs</button>
                <button class="tab-btn" id="tab-report" onclick="switchTeacherTab('report')">📊 Overall Report</button>
            </div>

            <div id="teacher-daily-view">
                <div id="teacher-grid" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>

            <div id="teacher-day-view" class="hidden">
                <button class="submit-btn" style="background: #3498db; margin-bottom: 15px;" onclick="closeDayView()">↑ Back to Calendar Grid</button>
                <h3 id="day-view-title" style="color: #2c3e50; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 5px;"></h3>
                <div id="day-view-list">
                    </div>
            </div>

            <div id="teacher-report-view" class="hidden">
                <div class="filter-row">
                    <div style="flex:1;"><label style="font-size:0.8rem; color:#7f8c8d;">Start Date</label><input type="date" id="startDate" onchange="renderStudentReport()"></div>
                    <div style="flex:1;"><label style="font-size:0.8rem; color:#7f8c8d;">End Date</label><input type="date" id="endDate" onchange="renderStudentReport()"></div>
                </div>
                
                <button class="submit-btn" style="background: #e67e22; margin-bottom: 15px;" onclick="downloadPDF(this)">⬇ Download as PDF</button>

                <div id="pdf-content" style="background: white; padding: 10px;">
                    <h3 id="report-title" style="color: #2c3e50; text-align: left; margin-bottom: 5px;">Class Report</h3>
                    <p id="report-date-range" style="text-align: left; font-size: 0.85rem; color: #7f8c8d; margin-top: 0;"></p>
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>Enrollment</th>
                                <th>Name</th>
                                <th>Total Classes</th>
                                <th>Present</th>
                                <th>Leave</th>
                                <th>Percentage</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbxC52QjG70vEclTenjjaumbHvH3DSApGcdoFJaBZx1Vfk2gO_kPdlPnT5XoUQS2SdLj/exec"; 
        let allRecords = [];

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        function showScreen(screenId) {
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        function resetPortal() {
            document.getElementById('studentId').value = "";
            document.getElementById('teacherId').value = "";
            document.getElementById('teacherPin').value = "";
            showScreen('role-screen');
        }

        async function fetchAttendance(role) {
            let id = "", pin = "";
            
            // Show loading indicators based on role
            if (role === 'student') {
                id = document.getElementById('studentId').value.trim().toUpperCase();
                if (!id) return alert("Please enter your Enrollment Number.");
                document.getElementById('student-submit-btn').disabled = true;
                document.getElementById('student-loading-text').classList.remove('hidden');
            } else {
                id = document.getElementById('teacherId').value.trim(); 
                pin = document.getElementById('teacherPin').value.trim();
                if (!id || !pin) return alert("Please enter both ID and PIN.");
                document.getElementById('teacher-submit-btn').disabled = true;
                document.getElementById('loading-text').classList.remove('hidden');
            }

            try {
                const response = await fetch(GOOGLE_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getUserReport", userId: id, role: role, pin: pin })
                });
                const data = await response.json();
                
                // Hide loading indicators
                document.getElementById('student-loading-text').classList.add('hidden');
                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('student-submit-btn').disabled = false;
                document.getElementById('teacher-submit-btn').disabled = false;

                if(data.status === 'success') {
                    if (data.records.length > 0) {
                        allRecords = data.records;
                        
                        if(role === 'student') {
                            document.getElementById('student-welcome').innerText = `Report for: ${id}`;
                            showScreen('student-dashboard');
                            applyStudentFilters();
                        } else {
                            document.getElementById('teacher-welcome').innerText = `Welcome, ${id} Sir`;
                            showScreen('teacher-dashboard');
                            setupTeacherDashboard();
                        }
                    } else {
                        alert("No records found.");
                    }
                } else {
                    alert("Error: " + data.message);
                }
            } catch (e) {
                document.getElementById('student-loading-text').classList.add('hidden');
                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('student-submit-btn').disabled = false;
                document.getElementById('teacher-submit-btn').disabled = false;
                alert("Connection failed.");
            }
        }

        // ==========================================
        // STUDENT LOGIC
        // ==========================================
        function applyStudentFilters() {
            const month = document.getElementById('monthFilter').value;
            const logList = document.getElementById('student-log-list');
            logList.innerHTML = "";

            let p = 0, a = 0;
            
            let sortedRecords = [...allRecords].sort((a, b) => new Date(b.date) - new Date(a.date));

            sortedRecords.forEach(rec => {
                const recDate = new Date(rec.date);
                if (month !== "all" && recDate.getMonth() != month) return;

                const statusUpper = rec.status.toUpperCase();
                const isPresent = statusUpper === 'PRESENT';
                const isLeave = statusUpper === 'LEAVE';
                
                if(isPresent) p++; 
                else if (!isLeave) a++; 
                
                let statusClass = 'status-absent';
                if (isPresent) statusClass = 'status-present';
                if (isLeave) statusClass = 'status-leave';

                logList.innerHTML += `
                    <div class="history-item">
                        <span>${recDate.toDateString()}</span>
                        <span class="${statusClass}">${rec.status}</span>
                    </div>`;
            });

            const total = p + a;
            document.getElementById('perc').innerText = total > 0 ? ((p / total) * 100).toFixed(1) + "%" : "0%";
            document.getElementById('pres').innerText = p;
            document.getElementById('abs').innerText = a;
        }

        // ==========================================
        // TEACHER LOGIC
        // ==========================================
        function setupTeacherDashboard() {
            closeDayView();
            document.getElementById('teacher-tabs').style.display = 'flex';
            switchTeacherTab('daily'); 

            const batches = [...new Set(allRecords.map(r => r.batch))];
            const select = document.getElementById('teacherBatchSelect');
            
            select.innerHTML = '<option value="">-- Select Semester / Batch --</option>';
            batches.forEach(b => {
                select.innerHTML += `<option value="${b}">${b}</option>`;
            });
            document.getElementById('teacher-grid').innerHTML = '';
            document.getElementById('report-table-body').innerHTML = '';
        }

        function handleBatchChange() {
            renderTeacherGrid();
            renderStudentReport();
        }

        function switchTeacherTab(tab) {
            document.getElementById('tab-daily').classList.remove('active');
            document.getElementById('tab-report').classList.remove('active');
            
            if(tab === 'daily') {
                document.getElementById('tab-daily').classList.add('active');
                document.getElementById('teacher-daily-view').classList.remove('hidden');
                document.getElementById('teacher-report-view').classList.add('hidden');
                closeDayView();
            } else {
                document.getElementById('tab-report').classList.add('active');
                document.getElementById('teacher-daily-view').classList.add('hidden');
                document.getElementById('teacher-day-view').classList.add('hidden');
                document.getElementById('teacher-report-view').classList.remove('hidden');
                renderStudentReport();
            }
        }

        function renderTeacherGrid() {
            const selectedBatch = document.getElementById('teacherBatchSelect').value;
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = '';
            if (!selectedBatch) return;

            const batchRecords = allRecords.filter(r => r.batch === selectedBatch);
            const groupedByDate = {};
            
            batchRecords.forEach(r => {
                const dateStr = new Date(r.date).toDateString();
                if (!groupedByDate[dateStr]) groupedByDate[dateStr] = [];
                groupedByDate[dateStr].push(r);
            });

            const sortedDates = Object.keys(groupedByDate).sort((a, b) => new Date(b) - new Date(a));

            sortedDates.forEach(date => {
                const records = groupedByDate[date];
                let p = 0, a = 0, l = 0;
                
                records.forEach(r => {
                    const st = r.status.toUpperCase();
                    if(st === 'PRESENT') p++; 
                    else if(st === 'LEAVE') l++; 
                    else a++;
                });

                const box = document.createElement('div');
                box.className = 'stat-card date-box';
                box.innerHTML = `
                    <h3 style="margin: 0; color: #2c3e50; text-align: left;">📅 ${date}</h3>
                    <div class="date-stats">
                        <div style="color: #34495e;"><b>${records.length}</b><br>Total Students</div>
                        <div style="color: #27ae60;"><b>${p}</b><br>Present</div>
                        <div style="color: #e74c3c;"><b>${a}</b><br>Absent</div>
                        <div style="color: #f39c12;"><b>${l}</b><br>Leave</div>
                    </div>
                `;
                box.onclick = () => renderDayView(date, records);
                grid.appendChild(box);
            });
        }

        function renderDayView(date, records) {
            document.getElementById('teacher-daily-view').classList.add('hidden');
            document.getElementById('teacher-tabs').style.display = 'none';
            document.getElementById('teacher-day-view').classList.remove('hidden');
            
            document.getElementById('day-view-title').innerText = `Class Log: ${date}`;
            const list = document.getElementById('day-view-list');
            list.innerHTML = '';
            
            records.forEach(r => {
                const statusUpper = r.status.toUpperCase();
                let statusClass = 'status-absent';
                if (statusUpper === 'PRESENT') statusClass = 'status-present';
                if (statusUpper === 'LEAVE') statusClass = 'status-leave';

                const cleanEnrollment = parseInt(r.enrollment.slice(-3), 10) || r.enrollment;
                
                list.innerHTML += `
                    <div class="history-item">
                        <div>
                            <span style="color: #7f8c8d; font-size: 0.8rem;">#${cleanEnrollment}</span><br>
                            <b>${r.name}</b>
                        </div>
                        <span class="${statusClass}">${r.status}</span>
                    </div>
                `;
            });
        }

        function closeDayView() {
            document.getElementById('teacher-daily-view').classList.remove('hidden');
            document.getElementById('teacher-day-view').classList.add('hidden');
            document.getElementById('teacher-tabs').style.display = 'flex'; 
        }

        function renderStudentReport() {
            const batch = document.getElementById('teacherBatchSelect').value;
            const tbody = document.getElementById('report-table-body');
            tbody.innerHTML = '';
            
            if(!batch) return;

            document.getElementById('report-title').innerText = `Class Report: ${batch}`;
            
            let startInput = document.getElementById('startDate').value;
            let endInput = document.getElementById('endDate').value;
            
            let dateText = "All Time";
            if(startInput || endInput) {
                dateText = `${startInput || 'Start'} to ${endInput || 'End'}`;
            }
            document.getElementById('report-date-range').innerText = `Date Range: ${dateText}`;

            let filtered = allRecords.filter(r => r.batch === batch);

            if (startInput) {
                let sDate = new Date(startInput);
                sDate.setHours(0,0,0,0);
                filtered = filtered.filter(r => new Date(r.date) >= sDate);
            }
            if (endInput) {
                let eDate = new Date(endInput);
                eDate.setHours(23,59,59,999);
                filtered = filtered.filter(r => new Date(r.date) <= eDate);
            }

            let students = {};
            filtered.forEach(r => {
                if(!students[r.enrollment]) {
                    students[r.enrollment] = { name: r.name, present: 0, leave: 0, total: 0 };
                }
                
                students[r.enrollment].total++;
                
                const stat = r.status.toUpperCase();
                if(stat === 'PRESENT') {
                    students[r.enrollment].present++;
                } else if (stat === 'LEAVE') {
                    students[r.enrollment].leave++;
                }
            });

            let studentArray = Object.keys(students).map(enrollment => ({
                enrollment: enrollment,
                name: students[enrollment].name,
                present: students[enrollment].present,
                leave: students[enrollment].leave,
                total: students[enrollment].total,
                perc: ((students[enrollment].present / students[enrollment].total) * 100).toFixed(1)
            }));
            
            studentArray.sort((a, b) => a.enrollment.localeCompare(b.enrollment));

            studentArray.forEach(s => {
                let color = '';
                if (s.perc >= 70) color = '#27ae60'; 
                else if (s.perc >= 50) color = '#f39c12'; 
                else if (s.perc >= 30) color = '#8e44ad'; 
                else color = '#e74c3c'; 

                let row = `<tr>
                    <td style="font-size:0.8rem; color:#7f8c8d;">${s.enrollment}</td>
                    <td style="font-weight:bold;">${s.name}</td>
                    <td style="color:#34495e; font-weight:bold;">${s.total}</td>
                    <td style="color:#27ae60; font-weight:bold;">${s.present}</td>
                    <td style="color:#f39c12; font-weight:bold;">${s.leave}</td>
                    <td style="color:${color}; font-weight:bold;">${s.perc}%</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function downloadPDF(btnElement) {
            const batch = document.getElementById('teacherBatchSelect').value;
            if(!batch) return alert("Please select a Semester / Batch first.");

            const element = document.getElementById('pdf-content');
            
            const originalText = btnElement.innerText;
            btnElement.innerText = "⏳ Generating PDF... Please wait.";
            btnElement.style.opacity = "0.7";
            btnElement.disabled = true;
            
            const opt = {
                margin:       0.5,
                filename:     `${batch}_Attendance_Report.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, 
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: 'avoid-all', avoid: 'tr' }
            };

            try {
                html2pdf().set(opt).from(element).save().then(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.opacity = "1";
                    btnElement.disabled = false;
                }).catch(err => {
                    console.error("PDF Generation Error: ", err);
                    alert("Something went wrong generating the PDF. Check the browser console.");
                    btnElement.innerText = originalText;
                    btnElement.style.opacity = "1";
                    btnElement.disabled = false;
                });
            } catch (e) {
                alert("The PDF library failed to load. Please check your internet connection.");
                btnElement.innerText = originalText;
                btnElement.style.opacity = "1";
                btnElement.disabled = false;
            }
        }
    </script>
</body>
</html>
